name: Release

# Publie l'exe autonome dans une Release GitHub à chaque tag "v*"
# (ex: git tag v0.1.0 && git push origin v0.1.0)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (exe unique autonome)
        run: >
          dotnet publish ScreenClipTool.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o out

      - name: Zip
        run: Compress-Archive -Path out/ScreenClipTool.exe -DestinationPath TimeCap-win-x64.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: TimeCap-win-x64.zip
          generate_release_notes: true
